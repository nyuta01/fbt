name: adapter-release-check

on:
  push:
    tags:
      - "adapters/**/v*"
      - "sdk/go/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapter-release-check:
    name: Check adapter release tag
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Check adapter release plan
        run: make adapter-release-plan-check

      - name: Check official adapter protocol behavior
        run: make official-adapter-smoke

      - name: Check clean adapter installation
        run: make adapter-install-smoke
