<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">fbt support knowledge loop</title>
  <desc id="desc">A support ticket source feeds a case summary transform. A review gate approves the case summaries before a downstream weekly insights transform runs. fbt records artifacts, state, lineage, traces, and generated docs.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 12; }
      .node { fill: #ffffff; stroke: #b8c2d0; stroke-width: 2; rx: 10; }
      .source { fill: #eff6ff; stroke: #2563eb; }
      .runner { fill: #ecfdf5; stroke: #0f766e; }
      .review { fill: #fffbeb; stroke: #b7791f; }
      .state { fill: #f1f5f9; stroke: #64748b; }
      .title { fill: #0f172a; font: 700 28px Inter, Arial, sans-serif; }
      .subtitle { fill: #64748b; font: 500 15px Inter, Arial, sans-serif; }
      .label { fill: #0f172a; font: 700 18px Inter, Arial, sans-serif; }
      .small { fill: #475569; font: 500 13px Inter, Arial, sans-serif; }
      .mono { fill: #334155; font: 500 13px "JetBrains Mono", Menlo, monospace; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-muted { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <text class="title" x="60" y="58">Support knowledge loop that actually runs in the quickstart</text>
  <text class="subtitle" x="60" y="86">The demo runner is deterministic. Replacing the runner command makes the same fbt graph call OpenAI, Claude Code, Codex, Gemini, or another protocol-compatible runner.</text>

  <rect class="panel" x="42" y="118" width="1116" height="432"/>
  <text class="small" x="70" y="150">Project graph</text>

  <rect class="node source" x="80" y="198" width="190" height="116"/>
  <text class="label" x="104" y="235">Source files</text>
  <text class="mono" x="104" y="263">data/support/tickets</text>
  <text class="small" x="104" y="290">read-only evidence</text>

  <rect class="node runner" x="350" y="178" width="220" height="156"/>
  <text class="label" x="376" y="215">case_summaries</text>
  <text class="small" x="376" y="243">runner: demo.llm</text>
  <text class="small" x="376" y="267">eval: required sections</text>
  <text class="mono" x="376" y="298">target/artifacts/...</text>

  <rect class="node review" x="652" y="198" width="180" height="116"/>
  <text class="label" x="684" y="235">Review gate</text>
  <text class="small" x="684" y="263">pending to approved</text>
  <text class="small" x="684" y="288">confidence: reviewed</text>

  <rect class="node runner" x="914" y="178" width="206" height="156"/>
  <text class="label" x="940" y="215">weekly insights</text>
  <text class="small" x="940" y="243">runner: demo.agent</text>
  <text class="small" x="940" y="267">requires approved input</text>
  <text class="mono" x="940" y="298">weekly_insights.md</text>

  <path class="arrow" d="M 270 256 L 343 256"/>
  <path class="arrow" d="M 570 256 L 645 256"/>
  <path class="arrow" d="M 832 256 L 907 256"/>

  <rect class="node state" x="102" y="390" width="190" height="92"/>
  <text class="label" x="128" y="424">Assets</text>
  <text class="small" x="128" y="451">prompt, style guide</text>

  <rect class="node state" x="354" y="390" width="190" height="92"/>
  <text class="label" x="380" y="424">Policy</text>
  <text class="small" x="380" y="451">read/write scope</text>

  <rect class="node state" x="606" y="390" width="190" height="92"/>
  <text class="label" x="632" y="424">Local state</text>
  <text class="mono" x="632" y="451">.fbt/state</text>

  <rect class="node state" x="858" y="390" width="210" height="92"/>
  <text class="label" x="884" y="424">Standard exports</text>
  <text class="small" x="884" y="451">OpenLineage, OTLP/JSON</text>

  <path class="arrow-muted dash" d="M 196 390 C 244 350 302 323 350 294"/>
  <path class="arrow-muted dash" d="M 448 390 C 468 354 462 342 462 334"/>
  <path class="arrow-muted dash" d="M 702 390 C 690 358 670 332 642 314"/>
  <path class="arrow-muted dash" d="M 702 482 C 738 516 820 516 930 482"/>

  <rect class="panel" x="42" y="584" width="1116" height="92"/>
  <text class="small" x="70" y="616">After the run</text>
  <text class="mono" x="70" y="646">target/artifacts/support/case_summaries/index.md</text>
  <text class="mono" x="446" y="646">target/artifacts/support/weekly_insights.md</text>
  <text class="mono" x="780" y="646">target/lineage/openlineage.ndjson</text>
</svg>
