name: daily-fbt-support-knowledge

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * *"

concurrency:
  group: daily-fbt-support-knowledge
  cancel-in-progress: false

jobs:
  daily-support-knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FBT_VERSION: v0.2.1
      FBT_PROJECT_DIR: examples/daily_qa_ops
      FBT_SELECTOR: tag:daily_qa
      FBT_SECURITY_PROFILE: ci-sandbox
      FBT_RUN_ID: gha-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned fbt
        run: |
          curl -fsSL https://raw.githubusercontent.com/nyuta01/fbt/main/install.sh | sh -s -- --version "$FBT_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fbt version

      - name: Prepare or verify source window
        run: |
          examples/daily_qa_ops/ops/check-source-window.py \
            --project-dir "$FBT_PROJECT_DIR" \
            --ready-file "$FBT_PROJECT_DIR/data/qa/inbox/_READY"

      - name: Run authoritative daily fbt loop
        run: examples/daily_qa_ops/ops/run-daily.sh

      - name: Upload fbt run evidence
        uses: actions/upload-artifact@v4
        with:
          name: fbt-daily-support-knowledge
          retention-days: 30
          path: |
            examples/daily_qa_ops/target/ops/latest/
            examples/daily_qa_ops/target/ops/runs/${{ env.FBT_RUN_ID }}/
            examples/daily_qa_ops/target/ops/archives/${{ env.FBT_RUN_ID }}/
            examples/daily_qa_ops/target/ops/publish/${{ env.FBT_RUN_ID }}/

      # Add publish, PR, or notification steps after artifact upload. CI is the
      # authoritative builder; fbt still does not approve or publish content.
