policies:
  - name: support_manual_generation_scope
    read:
      - data/support/
      - data/reference/
      - assets/
    write:
      - .fbt/work/
      - target/artifacts/support/
    network: true
    tools:
      allow:
        - read_source
        - read_artifact
        - write_markdown
      deny:
        - write_source_files
        - shell
    limits:
      timeout_seconds: 900
      max_cost_usd: 5.00
      max_tool_calls: 20
    review:
      required: true
      group: support_leads
